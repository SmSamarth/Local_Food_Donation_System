<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Donation System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🍽️ Food Donation System</h1>
        <p>Connect food donors with those in need</p>
    </header>

    <main>
        <div class="container">
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('donate')">Donate Food</button>
                <button class="tab-btn" onclick="showTab('browse')">Browse Donations</button>
                <button class="tab-btn" onclick="showTab('search')">Search</button>
            </div>

            <!-- Donation Form -->
            <div id="donate" class="tab-content active">
                <div class="form-container">
                    <h2>Donate Food</h2>
                    <form id="donationForm">
                        <div class="form-group">
                            <label for="donorName">Your Name:</label>
                            <input type="text" id="donorName" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="foodType">Food Type:</label>
                            <select id="foodType" required>
                                <option value="">Select food type</option>
                                <option value="Cooked Meals">Cooked Meals</option>
                                <option value="Fruits">Fruits</option>
                                <option value="Vegetables">Vegetables</option>
                                <option value="Packaged Food">Packaged Food</option>
                                <option value="Beverages">Beverages</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="quantity">Quantity (servings/items):</label>
                            <input type="number" id="quantity" min="1" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="location">Pickup Location:</label>
                            <input type="text" id="location" placeholder="Enter your address" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="contact">Contact Number:</label>
                            <input type="tel" id="contact" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="notes">Additional Notes:</label>
                            <textarea id="notes" rows="3" placeholder="Any special instructions or details"></textarea>
                        </div>
                        
                        <button type="submit" class="btn-primary">Submit Donation</button>
                    </form>
                </div>
            </div>

            <!-- Browse Donations -->
            <div id="browse" class="tab-content">
                <h2>Available Donations</h2>
                <div class="donations-grid" id="donationsGrid">
                    <!-- Donations will be loaded here -->
                </div>
            </div>

            <!-- Search -->
            <div id="search" class="tab-content">
                <h2>Search Donations</h2>
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Enter location to search">
                    <button onclick="searchDonations()" class="btn-secondary">Search</button>
                </div>
                <div class="search-results" id="searchResults"></div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Food Donation System. Reducing food waste, feeding communities.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
